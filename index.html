<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kountikk.space</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
            background:#000;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            color:#fff;
            overflow:hidden;
            user-select:none;
        }
        .bg-doodles{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            pointer-events:none;
            z-index:0;
        }
        .doodle{
            position:absolute;
            font-weight:900;
            font-family:'Courier New',monospace;
            white-space:nowrap;
            animation:drift 25s linear infinite,flicker 3s ease-in-out infinite;
            color:rgba(255,255,255,.12);
            text-shadow:0 0 8px rgba(0,0,0,.7);
            font-size:clamp(0.7rem,2vw,1.2rem);
        }
        .doodle-icon{
            position:absolute;
            animation:drift 20s linear infinite,flicker 4s ease-in-out infinite;
            color:rgba(255,255,255,.15);
            font-size:clamp(1.5rem,5vw,3rem);
            filter:drop-shadow(0 0 6px rgba(255,255,255,.1));
        }
        @keyframes drift{
            0%{transform:translate(0,0) rotate(0deg)}
            25%{transform:translate(25px,-20px) rotate(5deg)}
            50%{transform:translate(-20px,-45px) rotate(-5deg)}
            75%{transform:translate(-30px,-10px) rotate(3deg)}
            100%{transform:translate(0,0) rotate(0deg)}
        }
        @keyframes flicker{
            0%,100%{opacity:.5}
            50%{opacity:1}
        }
        .card{
            background:rgba(10,10,20,.8);
            backdrop-filter:blur(35px);
            border-radius:30px;
            padding:clamp(30px,8vw,50px) clamp(20px,8vw,40px);
            text-align:center;
            box-shadow:0 0 60px rgba(139,92,246,.15),0 0 120px rgba(59,130,246,.08),inset 0 1px 0 rgba(255,255,255,.05);
            border:1px solid rgba(255,255,255,.08);
            position:relative;
            z-index:1;
            width:90%;
            max-width:400px;
        }
        .glitch-wrapper{margin-bottom:15px;}
        .glitch{
            font-size:clamp(2rem,8vw,3rem);
            font-weight:900;
            text-transform:uppercase;
            position:relative;
            display:inline-block;
            color:#fff;
            letter-spacing:5px;
        }
        .glitch::before,.glitch::after{
            content:attr(data-text);
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:100%;
        }
        .glitch::before{
            left:2px;
            text-shadow:-2px 0 #ff00c1;
            animation:glitch-1 2s infinite linear alternate-reverse;
        }
        .glitch::after{
            left:-2px;
            text-shadow:-2px 0 #00fff9;
            animation:glitch-2 3s infinite linear alternate-reverse;
        }
        @keyframes glitch-1{
            0%{clip:rect(20px,9999px,21px,0)}
            20%{clip:rect(10px,9999px,55px,0)}
            40%{clip:rect(80px,9999px,35px,0)}
            60%{clip:rect(45px,9999px,75px,0)}
            80%{clip:rect(15px,9999px,90px,0)}
            100%{clip:rect(60px,9999px,40px,0)}
        }
        @keyframes glitch-2{
            0%{clip:rect(40px,9999px,71px,0)}
            20%{clip:rect(15px,9999px,30px,0)}
            40%{clip:rect(85px,9999px,20px,0)}
            60%{clip:rect(30px,9999px,85px,0)}
            80%{clip:rect(70px,9999px,15px,0)}
            100%{clip:rect(10px,9999px,55px,0)}
        }
        .subtitle{
            color:rgba(255,255,255,.35);
            font-size:.85rem;
            letter-spacing:8px;
            margin-bottom:35px;
        }
        .links{
            display:flex;
            flex-direction:column;
            gap:15px;
            align-items:center;
        }
        .link-btn{
            display:flex;
            align-items:center;
            justify-content:center;
            gap:14px;
            width:100%;
            max-width:280px;
            padding:16px 25px;
            border-radius:16px;
            text-decoration:none;
            color:#fff;
            font-weight:600;
            font-size:1rem;
            transition:all .4s cubic-bezier(.175,.885,.32,1.275);
            border:1px solid rgba(255,255,255,.15);
            background:rgba(255,255,255,.03);
        }
        .link-btn i{font-size:1.3rem;}
        .telegram{border-color:rgba(0,136,204,.5)}
        .telegram:hover{background:#0088cc;border-color:#0088cc;box-shadow:0 0 30px rgba(0,136,204,.6);transform:translateY(-3px)}
        .tiktok{border-color:rgba(255,255,255,.5)}
        .tiktok:hover{background:#111;border-color:#fff;box-shadow:0 0 30px rgba(255,255,255,.5);transform:translateY(-3px)}
        .vk{border-color:rgba(0,119,255,.5)}
        .vk:hover{background:#0077FF;border-color:#0077FF;box-shadow:0 0 30px rgba(0,119,255,.6);transform:translateY(-3px)}
        .soundcloud{border-color:rgba(255,85,0,.5)}
        .soundcloud:hover{background:#f50;border-color:#f50;box-shadow:0 0 30px rgba(255,85,0,.6);transform:translateY(-3px)}
        .footer-text{
            margin-top:30px;
            color:rgba(255,255,255,.15);
            font-size:.7rem;
            letter-spacing:3px;
        }
    </style>
</head>
<body>
    <div class="bg-doodles" id="bgDoodles"></div>
    <div class="card">
        <div class="glitch-wrapper"><div class="glitch" data-text="KOUNTIKK">KOUNTIKK</div></div>
        <div class="subtitle">● SOCIAL ●</div>
        <div class="links">
            <a href="https://t.me/experementalz" class="link-btn telegram"><i class="fab fa-telegram-plane"></i><span>Telegram</span></a>
            <a href="https://tiktok.com/@kountikk0" class="link-btn tiktok"><i class="fab fa-tiktok"></i><span>TikTok</span></a>
            <a href="https://vk.com/spitixhvh" class="link-btn vk"><i class="fab fa-vk"></i><span>VK</span></a>
            <a href="https://soundcloud.com/kountzzzz" class="link-btn soundcloud"><i class="fab fa-soundcloud"></i><span>SoundCloud</span></a>
        </div>
        <div class="footer-text">✦ KOUNTIKK.SPACE ✦</div>
    </div>
    <script>
        const bg=document.getElementById('bgDoodles');
        const texts=['CS','DOTA','EZ','GG','WP','ACE','RUSH B','AWP','DEAGLE','CLUTCH','HEADSHOT','NO SCOPE'];
        const icons=['fa-skull','fa-crosshairs','fa-fire','fa-bomb','fa-crown','fa-ghost','fa-dragon','fa-hat-wizard','fa-hand-fist','fa-shield-haltered','fa-sword','fa-bolt'];
        for(let i=0;i<12;i++){
            const el=document.createElement('div');
            el.classList.add('doodle');
            el.textContent=texts[i];
            el.style.left=(4+i*7.5)+'%';
            el.style.top=(3+i*7.8)+'%';
            el.style.animationDuration=(Math.random()*20+20)+'s';
            bg.appendChild(el);
        }
        for(let i=0;i<12;i++){
            const el=document.createElement('div');
            el.classList.add('doodle-icon');
            el.innerHTML='<i class="fas '+icons[i]+'"></i>';
            el.style.left=(8+i*7)+'%';
            el.style.top=(6+i*7.5)+'%';
            el.style.animationDuration=(Math.random()*15+25)+'s';
            bg.appendChild(el);
        }
    </script>
</body>
</html>

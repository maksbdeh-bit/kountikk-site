<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kountikk.space</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
            cursor: none;
            overflow: hidden;
            user-select: none;
        }

        /* --- Частицы --- */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: floatUp linear infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        /* --- Фоновый коллаж (картинки + текст) --- */
        .bg-doodles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .doodle {
            position: absolute;
            font-weight: 900;
            font-family: 'Courier New', monospace;
            white-space: nowrap;
            animation: drift 25s linear infinite, flicker 3s ease-in-out infinite;
            color: rgba(255, 255, 255, 0.15);
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
            font-size: clamp(1rem, 3vw, 2rem);
        }

        .doodle-img {
            position: absolute;
            animation: drift 25s linear infinite, flicker 4s ease-in-out infinite;
            opacity: 0.25;
            filter: drop-shadow(0 0 15px rgba(0,0,0,0.6));
            width: clamp(100px, 20vw, 200px);
            pointer-events: none;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(40px, -30px) rotate(3deg); }
            50% { transform: translate(-30px, -60px) rotate(-3deg); }
            75% { transform: translate(-45px, -20px) rotate(2deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        @keyframes flicker {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* --- Кастомный курсор --- */
        .cursor-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, rgba(59, 130, 246, 0.08) 30%, transparent 70%);
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 0;
            transition: all 0.15s ease-out;
        }

        .cursor-dot {
            position: fixed;
            width: 8px;
            height: 8px;
            background: #ffffff;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 999;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.8), 0 0 40px rgba(139, 92, 246, 0.4);
            transition: all 0.05s ease-out;
        }

        /* --- Основная карточка (адаптивная) --- */
        .card {
            background: rgba(10, 10, 20, 0.8);
            backdrop-filter: blur(35px);
            border-radius: 30px;
            padding: clamp(30px, 8vw, 50px) clamp(20px, 8vw, 40px);
            text-align: center;
            box-shadow: 0 0 60px rgba(139, 92, 246, 0.15), 0 0 120px rgba(59, 130, 246, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 400px;
        }

        /* --- Глитч-заголовок --- */
        .glitch-wrapper {
            margin-bottom: 15px;
        }

        .glitch {
            font-size: clamp(2rem, 8vw, 3rem);
            font-weight: 900;
            text-transform: uppercase;
            position: relative;
            display: inline-block;
            color: #ffffff;
            letter-spacing: 5px;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .glitch::before {
            left: 2px;
            text-shadow: -2px 0 #ff00c1;
            animation: glitch-1 2s infinite linear alternate-reverse;
            clip: rect(0, 900px, 0, 0);
        }

        .glitch::after {
            left: -2px;
            text-shadow: -2px 0 #00fff9;
            animation: glitch-2 3s infinite linear alternate-reverse;
            clip: rect(0, 900px, 0, 0);
        }

        @keyframes glitch-1 {
            0% { clip: rect(20px, 9999px, 21px, 0); }
            20% { clip: rect(10px, 9999px, 55px, 0); }
            40% { clip: rect(80px, 9999px, 35px, 0); }
            60% { clip: rect(45px, 9999px, 75px, 0); }
            80% { clip: rect(15px, 9999px, 90px, 0); }
            100% { clip: rect(60px, 9999px, 40px, 0); }
        }

        @keyframes glitch-2 {
            0% { clip: rect(40px, 9999px, 71px, 0); }
            20% { clip: rect(15px, 9999px, 30px, 0); }
            40% { clip: rect(85px, 9999px, 20px, 0); }
            60% { clip: rect(30px, 9999px, 85px, 0); }
            80% { clip: rect(70px, 9999px, 15px, 0); }
            100% { clip: rect(10px, 9999px, 55px, 0); }
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.85rem;
            letter-spacing: 8px;
            margin-bottom: 35px;
        }

        /* --- Кнопки (адаптивные) --- */
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            width: 100%;
            max-width: 280px;
            padding: 16px 25px;
            border-radius: 16px;
            text-decoration: none;
            color: #ffffff;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.03);
            position: relative;
            overflow: hidden;
            cursor: none;
            backdrop-filter: blur(5px);
        }

        .link-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transition: left 0.6s;
        }

        .link-btn:hover::before {
            left: 100%;
        }

        .link-btn i {
            font-size: 1.3rem;
            position: relative;
            z-index: 1;
            transition: transform 0.3s ease;
        }

        .link-btn:hover i {
            transform: scale(1.2);
        }

        .link-btn span {
            position: relative;
            z-index: 1;
        }

        .telegram {
            border-color: rgba(0, 136, 204, 0.5);
            box-shadow: 0 0 20px rgba(0, 136, 204, 0.15);
        }
        .telegram:hover {
            background: linear-gradient(135deg, #0088cc, #00a8e8);
            border-color: #0088cc;
            box-shadow: 0 0 40px rgba(0, 136, 204, 0.6), 0 10px 30px rgba(0, 136, 204, 0.4);
            transform: translateY(-3px) scale(1.02);
        }

        .tiktok {
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
        }
        .tiktok:hover {
            background: linear-gradient(135deg, #111111, #000000);
            border-color: #ffffff;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.5), 0 10px 30px rgba(255, 255, 255, 0.3);
            transform: translateY(-3px) scale(1.02);
        }

        .vk {
            border-color: rgba(0, 119, 255, 0.5);
            box-shadow: 0 0 20px rgba(0, 119, 255, 0.15);
        }
        .vk:hover {
            background: linear-gradient(135deg, #0077FF, #2787F5);
            border-color: #0077FF;
            box-shadow: 0 0 40px rgba(0, 119, 255, 0.6), 0 10px 30px rgba(0, 119, 255, 0.4);
            transform: translateY(-3px) scale(1.02);
        }

        .soundcloud {
            border-color: rgba(255, 85, 0, 0.5);
            box-shadow: 0 0 20px rgba(255, 85, 0, 0.15);
        }
        .soundcloud:hover {
            background: linear-gradient(135deg, #ff5500, #ff8800);
            border-color: #ff5500;
            box-shadow: 0 0 40px rgba(255, 85, 0, 0.6), 0 10px 30px rgba(255, 85, 0, 0.4);
            transform: translateY(-3px) scale(1.02);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .footer-text {
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.15);
            font-size: 0.7rem;
            letter-spacing: 3px;
        }

        /* Адаптация под телефон */
        @media (max-width: 480px) {
            .cursor-glow, .cursor-dot {
                display: none;
            }
            body {
                cursor: auto;
            }
            .link-btn {
                cursor: pointer;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="bg-doodles" id="bgDoodles"></div>
    <div class="cursor-glow" id="cursorGlow"></div>
    <div class="cursor-dot" id="cursorDot"></div>

    <div class="card">
        <div class="glitch-wrapper">
            <div class="glitch" data-text="KOUNTIKK">KOUNTIKK</div>
        </div>
        <div class="subtitle">● SOCIAL ●</div>

        <div class="links">
            <a href="https://t.me/experementalz" target="_blank" class="link-btn telegram">
                <i class="fab fa-telegram-plane"></i>
                <span>Telegram</span>
            </a>

            <a href="https://tiktok.com/@kountikk0" target="_blank" class="link-btn tiktok">
                <i class="fab fa-tiktok"></i>
                <span>TikTok</span>
            </a>

            <a href="https://vk.com/spitixhvh" target="_blank" class="link-btn vk">
                <i class="fab fa-vk"></i>
                <span>VK</span>
            </a>

            <a href="https://soundcloud.com/kountzzzz" target="_blank" class="link-btn soundcloud">
                <i class="fab fa-soundcloud"></i>
                <span>SoundCloud</span>
            </a>
        </div>

        <div class="footer-text">✦ KOUNTIKK.SPACE ✦</div>
    </div>

    <script>
        // Частицы
        const particlesContainer = document.getElementById('particles');
        function createParticle() {
            const p = document.createElement('div');
            p.classList.add('particle');
            const size = Math.random() * 2 + 0.5;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.left = (Math.random() * 100) + '%';
            p.style.animationDuration = (Math.random() * 12 + 10) + 's';
            p.style.animationDelay = (Math.random() * 6) + 's';
            particlesContainer.appendChild(p);
            setTimeout(() => p.remove(), (parseFloat(p.style.animationDuration) + parseFloat(p.style.animationDelay)) * 1000);
        }
        for (let i = 0; i < 40; i++) setTimeout(createParticle, Math.random() * 5000);
        setInterval(createParticle, 400);

        // Коллаж из картинок и надписей
        const bgDoodles = document.getElementById('bgDoodles');
        const texts = ['CS', 'DOTA', 'EZ', 'GG', 'WP', 'ACE', 'CLUTCH', 'RAMPAGE', 'HEADSHOT', 'DEAGLE', 'AWP', 'RUSH B', 'MID OR FEED', 'CHEEKI BREEKI', 'WALLHACK', 'AIMBOT', 'NO SCOPE', '1 TAP'];

        const imageUrls = [
            'https://raw.githubusercontent.com/maksbdeh-bit/kountikk-site/main/yellow%20cs2%20%F0%9F%A5%B0.jpg',
            'https://raw.githubusercontent.com/maksbdeh-bit/kountikk-site/main/%D0%91%D0%B5%D0%B7%20%D0%BD%D0%B0%D0%B7%D0%B2%D0%B0%D0%BD%D0%B8%D1%8F%20(5).jpg',
            'https://raw.githubusercontent.com/maksbdeh-bit/kountikk-site/main/%D0%91%D0%B5%D0%B7%20%D0%BD%D0%B0%D0%B7%D0%B2%D0%B0%D0%BD%D0%B8%D1%8F%20(6).jpg'
        ];

        function createDoodleElement() {
            const rand = Math.random();
            if (rand < 0.5) { // Картинка
                const img = document.createElement('img');
                img.classList.add('doodle-img');
                img.src = imageUrls[Math.floor(Math.random() * imageUrls.length)];
                img.style.left = (Math.random() * 85) + '%';
                img.style.top = (Math.random() * 80) + '%';
                img.style.animationDuration = (Math.random() * 30 + 20) + 's';
                img.style.transform = 'rotate(' + (Math.random() * 20 - 10) + 'deg)';
                bgDoodles.appendChild(img);
            } else { // Текст
                const el = document.createElement('div');
                el.classList.add('doodle');
                el.textContent = texts[Math.floor(Math.random() * texts.length)];
                el.style.left = (Math.random() * 85) + '%';
                el.style.top = (Math.random() * 80) + '%';
                el.style.animationDuration = (Math.random() * 30 + 20) + 's';
                el.style.transform = 'rotate(' + (Math.random() * 15 - 7) + 'deg)';
                bgDoodles.appendChild(el);
            }
        }

        // Создаём 22 элемента (примерно поровну картинок и текста)
        for (let i = 0; i < 22; i++) {
            createDoodleElement();
        }

        // Кастомный курсор
        const cursorGlow = document.getElementById('cursorGlow');
        const cursorDot = document.getElementById('cursorDot');
        let mx = 0, my = 0, gx = 0, gy = 0;

        document.addEventListener('mousemove', function(e) {
            mx = e.clientX;
            my = e.clientY;
            cursorDot.style.left = mx + 'px';
            cursorDot.style.top = my + 'px';
        });

        function anim() {
            gx += (mx - gx) * 0.08;
            gy += (my - gy) * 0.08;
            cursorGlow.style.left = gx + 'px';
            cursorGlow.style.top = gy + 'px';
            requestAnimationFrame(anim);
        }
        anim();

        document.addEventListener('touchmove', function(e) {
            mx = e.touches[0].clientX;
            my = e.touches[0].clientY;
            cursorDot.style.left = mx + 'px';
            cursorDot.style.top = my + 'px';
        });
    </script>
</body>
</html>
